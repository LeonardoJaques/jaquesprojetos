<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0a0a0a"/>
  <!-- Header -->
  <text x="20" y="30" font-family="monospace" font-size="12" font-weight="bold" fill="#e8e8e8">Lab Java Quarkus</text>
  <text x="380" y="30" font-family="monospace" font-size="10" fill="#ff5555" text-anchor="end">Java 21</text>
  <line x1="0" y1="40" x2="400" y2="40" stroke="#1a1a1a" stroke-width="1"/>

  <!-- GET /users -->
  <rect x="12" y="50" width="376" height="36" rx="4" fill="#0a1f10"/>
  <rect x="12" y="50" width="4" height="36" rx="2" fill="#00dd88"/>
  <text x="26" y="69" font-family="monospace" font-size="11" font-weight="bold" fill="#00dd88">GET</text>
  <text x="66" y="69" font-family="monospace" font-size="11" fill="#888">/api/v1/users</text>
  <rect x="340" y="57" width="40" height="22" rx="3" fill="#0a2a10"/>
  <text x="360" y="72" font-family="monospace" font-size="10" fill="#00dd88" text-anchor="middle">200</text>

  <!-- POST /auth -->
  <rect x="12" y="96" width="376" height="36" rx="4" fill="#1f1f0a"/>
  <rect x="12" y="96" width="4" height="36" rx="2" fill="#ffdd00"/>
  <text x="26" y="115" font-family="monospace" font-size="11" font-weight="bold" fill="#ffdd00">POST</text>
  <text x="75" y="115" font-family="monospace" font-size="11" fill="#888">/api/v1/auth/login</text>
  <rect x="340" y="103" width="40" height="22" rx="3" fill="#2a2a0a"/>
  <text x="360" y="118" font-family="monospace" font-size="10" fill="#ffdd00" text-anchor="middle">201</text>

  <!-- PUT /users/{id} -->
  <rect x="12" y="142" width="376" height="36" rx="4" fill="#1a130a"/>
  <rect x="12" y="142" width="4" height="36" rx="2" fill="#ff9944"/>
  <text x="26" y="161" font-family="monospace" font-size="11" font-weight="bold" fill="#ff9944">PUT</text>
  <text x="66" y="161" font-family="monospace" font-size="11" fill="#888">/api/v1/users/{id}</text>
  <rect x="340" y="149" width="40" height="22" rx="3" fill="#2a1a0a"/>
  <text x="360" y="164" font-family="monospace" font-size="10" fill="#ff9944" text-anchor="middle">200</text>

  <!-- DELETE -->
  <rect x="12" y="188" width="376" height="36" rx="4" fill="#1a0a0a"/>
  <rect x="12" y="188" width="4" height="36" rx="2" fill="#ff5555"/>
  <text x="26" y="207" font-family="monospace" font-size="11" font-weight="bold" fill="#ff5555">DELETE</text>
  <text x="95" y="207" font-family="monospace" font-size="11" fill="#888">/api/v1/users/{id}</text>
  <rect x="340" y="195" width="40" height="22" rx="3" fill="#2a0a0a"/>
  <text x="360" y="210" font-family="monospace" font-size="10" fill="#ff5555" text-anchor="middle">204</text>

  <!-- Footer tech tags -->
  <text x="20" y="255" font-family="monospace" font-size="9" fill="#444">Quarkus · Spring Security · JWT · JPA · Swagger</text>
  <text x="20" y="275" font-family="monospace" font-size="9" fill="#333">PostgreSQL · Docker · REST · OpenAPI 3.0</text>
</svg>

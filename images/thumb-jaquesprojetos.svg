<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0a0a0a"/>
  <!-- scanlines -->
  <rect width="400" height="300" fill="url(#scanlines)" opacity="0.4"/>
  <defs>
    <pattern id="scanlines" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="2" fill="transparent"/>
      <rect y="2" width="1" height="2" fill="rgba(0,204,136,0.04)"/>
    </pattern>
  </defs>
  <!-- Terminal header bar -->
  <rect width="400" height="32" fill="#1a1a1a"/>
  <circle cx="16" cy="16" r="5" fill="#ff5555" opacity="0.7"/>
  <circle cx="34" cy="16" r="5" fill="#ffdd55" opacity="0.7"/>
  <circle cx="52" cy="16" r="5" fill="#55ff55" opacity="0.7"/>
  <text x="200" y="21" font-family="monospace" font-size="10" fill="#008866" text-anchor="middle">jaques@terminal ~ portfolio</text>
  <!-- Prompt line -->
  <text x="20" y="60" font-family="monospace" font-size="11" fill="#00bbbb">❯ jaques@archlinux:~$</text>
  <text x="195" y="60" font-family="monospace" font-size="11" fill="#00dd88"> cat about.txt</text>
  <!-- Output -->
  <text x="20" y="90" font-family="monospace" font-size="20" font-weight="bold" fill="#00dd88">Jaques</text>
  <text x="20" y="115" font-family="monospace" font-size="20" font-weight="bold" fill="#00cc88">Projetos</text>
  <text x="20" y="145" font-family="monospace" font-size="11" fill="#008866">// Software Architect &amp; Full Stack Dev</text>
  <!-- Tech tags -->
  <rect x="20" y="162" width="60" height="18" rx="3" fill="rgba(0,221,136,0.1)" stroke="#00dd88" stroke-width="1"/>
  <text x="50" y="175" font-family="monospace" font-size="9" fill="#00dd88" text-anchor="middle">HTML/CSS</text>
  <rect x="88" y="162" width="40" height="18" rx="3" fill="rgba(0,221,136,0.1)" stroke="#00dd88" stroke-width="1"/>
  <text x="108" y="175" font-family="monospace" font-size="9" fill="#00dd88" text-anchor="middle">JS</text>
  <rect x="136" y="162" width="60" height="18" rx="3" fill="rgba(0,221,136,0.1)" stroke="#00dd88" stroke-width="1"/>
  <text x="166" y="175" font-family="monospace" font-size="9" fill="#00dd88" text-anchor="middle">i18n PT/EN</text>
  <rect x="204" y="162" width="55" height="18" rx="3" fill="rgba(0,221,136,0.1)" stroke="#00dd88" stroke-width="1"/>
  <text x="231" y="175" font-family="monospace" font-size="9" fill="#00dd88" text-anchor="middle">LGPD</text>
  <!-- Cursor -->
  <text x="20" y="215" font-family="monospace" font-size="11" fill="#00bbbb">❯</text>
  <rect x="34" y="202" width="9" height="16" fill="#00dd88" opacity="0.9"/>
  <!-- URL -->
  <text x="380" y="288" font-family="monospace" font-size="9" fill="#005544" text-anchor="end">jaquesprojetos.com.br</text>
</svg>

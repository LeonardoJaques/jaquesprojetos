<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0d0d0d"/>
  <!-- Title bar -->
  <text x="20" y="28" font-family="sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Kanban Board</text>
  <text x="370" y="28" font-family="monospace" font-size="10" fill="#00dd88" text-anchor="end">React / TypeScript</text>
  <line x1="0" y1="38" x2="400" y2="38" stroke="#222" stroke-width="1"/>

  <!-- Column: TO DO -->
  <rect x="12" y="48" width="112" height="240" rx="6" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <text x="68" y="70" font-family="sans-serif" font-size="10" font-weight="600" fill="#666" text-anchor="middle">TO DO</text>
  <!-- card -->
  <rect x="20" y="78" width="96" height="48" rx="4" fill="#1e1e1e" stroke="#333" stroke-width="1"/>
  <text x="30" y="96" font-family="sans-serif" font-size="9" fill="#aaa">Implementar auth</text>
  <text x="30" y="110" font-family="sans-serif" font-size="8" fill="#555">Backend · 3h</text>
  <rect x="20" y="134" width="96" height="48" rx="4" fill="#1e1e1e" stroke="#333" stroke-width="1"/>
  <text x="30" y="152" font-family="sans-serif" font-size="9" fill="#aaa">UI do dashboard</text>
  <text x="30" y="166" font-family="sans-serif" font-size="8" fill="#555">Frontend · 5h</text>
  <rect x="20" y="190" width="96" height="48" rx="4" fill="#1e1e1e" stroke="#333" stroke-width="1"/>
  <text x="30" y="208" font-family="sans-serif" font-size="9" fill="#aaa">Testes E2E</text>
  <text x="30" y="222" font-family="sans-serif" font-size="8" fill="#555">QA · 2h</text>

  <!-- Column: IN PROGRESS -->
  <rect x="144" y="48" width="112" height="240" rx="6" fill="#0d1f14" stroke="#00dd88" stroke-width="1"/>
  <text x="200" y="70" font-family="sans-serif" font-size="10" font-weight="600" fill="#00dd88" text-anchor="middle">IN PROGRESS</text>
  <!-- card active -->
  <rect x="152" y="78" width="96" height="48" rx="4" fill="#132a1c" stroke="#00dd88" stroke-width="1"/>
  <text x="162" y="96" font-family="sans-serif" font-size="9" fill="#00dd88">Drag and Drop</text>
  <text x="162" y="110" font-family="sans-serif" font-size="8" fill="#008844">React DnD · 4h</text>
  <rect x="152" y="134" width="96" height="48" rx="4" fill="#132a1c" stroke="#00aa66" stroke-width="1"/>
  <text x="162" y="152" font-family="sans-serif" font-size="9" fill="#cceecc">Multi-board</text>
  <text x="162" y="166" font-family="sans-serif" font-size="8" fill="#008844">TypeScript · 3h</text>

  <!-- Column: DONE -->
  <rect x="276" y="48" width="112" height="240" rx="6" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <text x="332" y="70" font-family="sans-serif" font-size="10" font-weight="600" fill="#666" text-anchor="middle">DONE</text>
  <!-- done cards with checkmark -->
  <rect x="284" y="78" width="96" height="48" rx="4" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="294" y="96" font-family="sans-serif" font-size="9" fill="#555">Setup inicial</text>
  <text x="294" y="110" font-family="sans-serif" font-size="8" fill="#00aa44">✓ Vite + TS</text>
  <rect x="284" y="134" width="96" height="48" rx="4" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="294" y="152" font-family="sans-serif" font-size="9" fill="#555">Local Storage</text>
  <text x="294" y="166" font-family="sans-serif" font-size="8" fill="#00aa44">✓ Persistência</text>
  <rect x="284" y="190" width="96" height="48" rx="4" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="294" y="208" font-family="sans-serif" font-size="9" fill="#555">Responsivo</text>
  <text x="294" y="222" font-family="sans-serif" font-size="8" fill="#00aa44">✓ Mobile</text>
